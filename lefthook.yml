# Pre-commit hooks. Install once with:
#   npm install -g lefthook   # or: mise use -g lefthook  / brew install lefthook
#   lefthook install
#
# Hooks operate on staged files only and modify them in place.

pre-commit:
  parallel: true
  commands:
    backend-format:
      glob: "backend/**/*.py"
      run: uv run --project backend ruff format {staged_files}
      stage_fixed: true
    backend-lint:
      glob: "backend/**/*.py"
      run: uv run --project backend ruff check --fix {staged_files}
      stage_fixed: true
    frontend-format:
      glob: "frontend/**/*.{ts,tsx,js,jsx,json,css,md}"
      # --ignore-path is required because lefthook runs from the repo root,
      # where prettier would otherwise not find frontend/.prettierignore and
      # would reformat the generated files under src/types/api/.
      run: npx --prefix frontend prettier --config frontend/.prettierrc.json --ignore-path frontend/.prettierignore --write {staged_files}
      stage_fixed: true
    frontend-lint:
      glob: "frontend/**/*.{ts,tsx}"
      run: npx --prefix frontend eslint --config frontend/eslint.config.js --fix {staged_files}
      stage_fixed: true

pre-push:
  commands:
    backend-tests:
      run: cd backend && uv run pytest -q
    frontend-tests:
      run: cd frontend && npm test --silent
