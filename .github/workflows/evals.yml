# Agent evals - LLM-as-judge. Slow, expensive, non-deterministic.
# Manual trigger only. Run before releasing a new agent version.
name: Agent Evals

on:
  workflow_dispatch:
    inputs:
      agent:
        description: 'Which agent to eval (scout / scribe / critic / all)'
        required: false
        default: 'all'

permissions:
  contents: read

jobs:
  agent-evals:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: backend/uv.lock

      - name: Set up Python
        run: uv python install 3.14

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Run evals
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          EXA_API_KEY: ${{ secrets.EXA_API_KEY }}
        run: |
          AGENT="${{ github.event.inputs.agent }}"
          if [ "$AGENT" = "all" ] || [ -z "$AGENT" ]; then
            uv run pytest tests/evals/ -m agent_eval
          else
            uv run pytest tests/evals/ -m agent_eval -k "$AGENT"
          fi
